context:
  version: "4.0.0"

package:
  name: mruby
  version: ${{ version }}

source:
  url: https://github.com/mruby/mruby/archive/refs/tags/${{ version }}.tar.gz
  sha256: e2ea271dbed14e9f2b33df773ae447b747dbc242ce2675022c0a57efea85a7b4
  patches:
    - 0001-fix-presym-skip-missing-task.patch

build:
  number: 0

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ruby
    - if: unix
      then:
        - bison
        - make
    - if: win
      then: m2-sed
  host:
    - if: unix
      then: readline

tests:
  - script:
      - if: unix
        then: |
          mruby -v
          mruby -h
      - if: win
        then: |
          mruby -v
          if %ERRORLEVEL% neq 0 exit /b 1
          mruby -h
          if %ERRORLEVEL% neq 0 exit /b 1

about:
  homepage: https://mruby.org
  repository: https://github.com/mruby/mruby
  documentation: https://mruby.org/docs
  license: MIT
  license_file: LICENSE
  summary: "Lightweight implementation of the Ruby language"
  description: |
    mruby is the lightweight implementation of the Ruby language complying with part of the ISO standard.
    mruby can be linked and embedded within your application.

extra:
  recipe-maintainers:
    - eunos-1128
